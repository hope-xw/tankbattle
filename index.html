<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tank Battle: Wasteland</title>
  <script type="module" crossorigin src="/tankbattle/assets/index-CrGOm-JT.js"></script>

<body>
  <div id="game-container">
    <canvas id="game-canvas" width="1280" height="700"></canvas>

        </div>
      </div>
      <div id="game-over" class="overlay wasteland-panel hidden">
        <h1 class="title-text-red">GAME OVER</h1>
        <button id="restart-btn" class="wasteland-btn">RESTART</button>
      </div>
    </div>
  </div>
